<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library – The Kids' Workshop</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="TKW_library.css" />
</head>

<body>
  <header class="site-header">
    <a href="index.html" class="header-logo">
      <img src="images/logo.png" alt="The Kids' Workshop Logo" />
      <div class="header-logo-text">THE KIDS'<br>WORKSHOP</div>
    </a>
    <nav class="header-nav">
      <a href="library.html" class="active">Library</a>
      <a href="workshops.html">Workshops</a>
      <a href="about.html">About Us</a>
    </nav>
    <div class="header-right">
      <form class="header-search search-form">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input id="headerSearchInput" type="text" placeholder="Search books, authors..." />
      </form>
      <div class="header-icons">
        <span class="lang-badge">English · AUD$</span>
        <a href="cart.html">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-count">0</span>
        </a>
        <a href="account.html">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-menu" id="mobileMenu">
    <a href="library.html">Library</a>
    <a href="workshops.html">Workshops</a>
    <a href="about.html">About Us</a>
  </nav>

  <div class="library-banner">
    <div class="banner-char banner-char-left">
      <img src="images/banner-char-left.png" alt="" aria-hidden="true" />
    </div>
    <h1 class="library-banner-title">Discover Your Next<br><em>Favourite Story</em></h1>
    <div class="banner-char banner-char-right">
      <img src="images/banner-char-right.png" alt="" aria-hidden="true" />
    </div>
  </div>

    <!-- Contents -->
  <div class="library-layout">
    <!-- filter -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <button class="sidebar-toggle" data-target="ageFilter">
          Age Range <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div id="ageFilter" class="sidebar-content">
          <label class="checkbox-label"><input type="checkbox" class="age-checkbox" value="0-6" /> 0–6 Years</label>
          <label class="checkbox-label"><input type="checkbox" class="age-checkbox" value="7-9" /> 7–9 Years</label>
          <label class="checkbox-label"><input type="checkbox" class="age-checkbox" value="10plus" /> 10+ Years</label>
        </div>
      </div>

      <div class="sidebar-section">
        <button class="sidebar-toggle" data-target="filterTags">
          Filter <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <div id="filterTags" class="sidebar-content">
          <div class="filter-chips">
            <button class="filter-chip active">All Books</button>
            <button class="filter-chip">Picture Books</button>
            <button class="filter-chip">Fables</button>
            <button class="filter-chip">Nature</button>
            <button class="filter-chip">STEM</button>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-label">Price Range</p>
        <div class="price-range-row">
          <span>$0</span>
          <input type="range" min="0" max="100" value="100" class="price-slider" />
          <span>$100+</span>
        </div>
      </div>

      <button class="btn-outline-dark">Clear Filters</button>
    </aside>

    <!-- Gallery header -->
    <main class="library-main">

      <!-- Search + Sort bar -->
      <div class="search-sort-bar">
        <form class="lib-search-form search-form" id="librarySearchForm">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input id="librarySearchInput" type="text" placeholder="Search for books, authors..." />
        </form>
        <div class="sort-row">
          <label for="sortBy">Sort by:</label>
          <select id="sortBy">
            <option>Most Popular</option>
            <option>Price: Low to High</option>
            <option>Price: High to Low</option>
            <option>Newest</option>
          </select>
        </div>
      </div>

      <!-- Gallery grid -->
      <div class="books-grid">

        <!-- Card 1 -->
        <!-- Card 2 -->
        <!-- Card 3 --> 
        <!-- Card 4 -->

  <!-- Recommend section -->
  <section class="recommend-section">
  </section>
  </footer>

</body>
</html>
